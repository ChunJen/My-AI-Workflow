services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_workflow_ops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_workflow_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/ai_workflow_ops"
      AI_API_KEY: "${AI_API_KEY}"
      AI_MODEL: "${AI_MODEL:-claude-sonnet-4-6}"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
